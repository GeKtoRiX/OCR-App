# Launcher-side TTS service toggles.
# These flags control which TTS sidecars `ocr.sh`, `tts.sh`, `ocr-tts.sh`, and `stack.sh`
# will start by default.
#
# Valid truthy values: true, yes, on, 1
# Valid falsy values: false, no, off, 0
#
# Current default: Kokoro + Voxtral.

TTS_ENABLE_SUPERTONE=false
TTS_ENABLE_KOKORO=true
TTS_ENABLE_F5=false
TTS_ENABLE_VOXTRAL=true
